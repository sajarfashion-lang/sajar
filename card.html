<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Well Come to Sajar BD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary-blue: #007bff; }
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin-bottom: 100px; }
        
        /* Search Box Style */
        #search-container { display: none; margin-bottom: 20px; width: 100%; max-width: 330px; }
        #search-input { width: 100%; padding: 10px; border-radius: 25px; border: 2px solid var(--primary-blue); outline: none; text-align: center; }

        #card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; }

        .card { width: 330px; background: #fff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); overflow: hidden; border: 1px solid #ddd; position: relative; }
        .header { background: var(--primary-blue); color: white; padding: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header img { width: 40px; height: 40px; background: white; border-radius: 5px; padding: 2px; object-fit: contain; }
        .company-name { font-size: 18px; font-weight: bold; }
        
        .photo-box { width: 100px; height: 100px; margin: 15px auto 5px; border: 3px solid var(--primary-blue); border-radius: 10px; overflow: hidden; background: #f9f9f9; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .user-name { text-align: center; margin: 5px 0 2px 0; color: #333; font-size: 20px; font-weight: bold; }
        .designation { text-align: center; color: var(--primary-blue); font-size: 14px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        
        .info { padding: 5px 25px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 6px; border-bottom: 1px solid #f0f0f0; padding-bottom: 3px; font-size: 13px; }
        .label { font-weight: bold; color: #555; }
        .value { color: #333; font-weight: 500; }
        
        .footer-area { display: flex; justify-content: space-around; align-items: flex-end; padding: 10px 20px 20px; }
        .sig-box { text-align: center; width: 100%; }
        .sig-box img { width: 80px; height: 35px; object-fit: contain; }
        .sig-text { font-size: 10px; border-top: 1px solid #999; display: block; margin-top: 5px; color: #666; }

        .download-btn { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; }

        /* Bottom Menu */
        .bottom-menu { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .menu-item { text-decoration: none; color: #555; font-weight: bold; font-size: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; border: none; background: none; }
        .menu-item span { font-size: 20px; margin-bottom: 2px; }

        #status { font-weight: bold; margin-top: 50px; color: #555; }
    </style>
</head>
<body>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="আইডি নাম্বার দিয়ে খুঁজুন..." onkeyup="filterCards()">
    </div>

    <div id="status">ডাটা লোড হচ্ছে...</div>
    <div id="card-container"></div>

    <div class="bottom-menu">
        <button class="menu-item" 
<a href="https://sajarbd.netlify.app/"
target="_blank" class="menu-item"><span>🏠</span>Sajar BD</button>
        <button class="menu-item" onclick="toggleSearch()"><span>🔍</span>Search</button>
        <a href="apli.html" target="_blank" class="menu-item"><span>🔵</span>Application</a>
    </div>

    <script>
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSkRxM4TRMMGk0dUWpNQMrl8m6pFWq6F_uFB6wzLIdXhyDrF6x4kHgXRRLK0IyOdT8UW2jjGR4JyCs0/pub?output=csv";

        fetch(url)
            .then(res => res.text())
            .then(csv => {
                let rows = csv.split('\n').map(row => row.split(',').map(item => item.trim()));
                let memberData = rows.slice(1); 
                
                const commonRow = memberData[0]; 
                const globalDesignation = commonRow[2] || "Designation";
                const globalSignature = commonRow[7] || "";
                const globalCompanyName = commonRow[8] || "Company Name";
                const globalLogo = commonRow[9] || "";

                memberData.reverse();

                let container = document.getElementById('card-container');
                container.innerHTML = '';

                memberData.forEach((cols, index) => {
                    if (cols.length < 2 || !cols[0]) return;

                    const name = cols[0];
                    const id = cols[1];
                    const phone = cols[3];
                    const blood = cols[4];
                    const address = cols[5];
                    const photo = cols[6] || "https://via.placeholder.com/100";

                    const wrapper = document.createElement('div');
                    wrapper.className = 'card-wrapper';
                    wrapper.setAttribute('data-id', id); // সার্চের জন্য আইডি সেট করা

                    wrapper.innerHTML = `
                    <div class="card" id="card-${index}">
                        <div class="header">
                            <img src="${globalLogo}" alt="Logo" crossorigin="anonymous">
                            <div class="company-name">${globalCompanyName}</div>
                        </div>
                        <div class="photo-box">
                            <img src="${photo}" alt="Photo" crossorigin="anonymous">
                        </div>
                        <div class="user-name">${name}</div>
                        <div class="designation">${globalDesignation}</div>
                        <div class="info">
                            <div class="info-row"><span class="label">আইডি নং:</span> <span class="value">${id}</span></div>
                            <div class="info-row"><span class="label">ফোন:</span> <span class="value">${phone}</span></div>
                            <div class="info-row"><span class="label">রক্ত:</span> <span class="value" style="color:red;">${blood}</span></div>
                            <div class="info-row" style="border:none;"><span class="label">ঠিকানা:</span> <span class="value">${address}</span></div>
                        </div>
                        <div class="footer-area">
                            <div class="sig-box">
                                <img src="${globalSignature}" alt="Sign" crossorigin="anonymous">
                                <span class="sig-text">Authorized</span>
                            </div>
                        </div>
                    </div>
                    <button class="download-btn" onclick="downloadCard('card-${index}', '${name}')">Download Card</button>
                    `;
                    container.appendChild(wrapper);
                });

                document.getElementById('status').style.display = 'none';
            })
            .catch(err => {
                document.getElementById('status').innerText = "ডাটা লোড করতে সমস্যা হচ্ছে।";
            });

        // সার্চ টগল ফাংশন
        function toggleSearch() {
            const sc = document.getElementById('search-container');
            sc.style.display = (sc.style.display === 'block') ? 'none' : 'block';
            if(sc.style.display === 'block') document.getElementById('search-input').focus();
        }

        // আইডি দিয়ে ফিল্টার করার ফাংশન
        function filterCards() {
            const input = document.getElementById('search-input').value.toUpperCase();
            const cards = document.getElementsByClassName('card-wrapper');
            
            for (let i = 0; i < cards.length; i++) {
                let idValue = cards[i].getAttribute('data-id');
                if (idValue.toUpperCase().indexOf(input) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // সব কার্ড দেখানোর ফাংশন (Home Button)
        function showAll() {
            document.getElementById('search-container').style.display = 'none';
            document.getElementById('search-input').value = '';
            const cards = document.getElementsByClassName('card-wrapper');
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = "";
            }
        }

        function downloadCard(cardId, name) {
            const card = document.getElementById(cardId);
            html2canvas(card, { useCORS: true, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${name}_ID_Card.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
